<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml" />
  </head>

  <body>
    <div class="wiki-header">
      <div class="header-inner">
        <a href="{{ site.baseurl }}/" class="wiki-logo">
          {% if site.avatar %}
          <img src="{{ site.avatar }}" alt="{{ site.name }} logo" />
          {% endif %}
          <span class="wiki-title">{{ site.name }}</span>
        </a>
        <nav class="top-nav">
          <a href="{{ site.baseurl }}/">Home</a>
          <a href="{{ site.baseurl }}/categories">Categories</a>
          <a href="{{ site.baseurl }}/about">About</a>
        </nav>
      </div>
    </div>

    <div class="wiki-body">
      <div class="wiki-sidebar">
        {% include sidebar.html %}
      </div>
      <main class="wiki-content" role="main">
        {{ content }}
      </main>
    </div>

    <div class="wiki-footer">
      <div class="footer-inner">
        <p>{{ site.name }} &middot; Built with <a href="https://jekyllrb.com">Jekyll</a></p>
        {% if site.footer-links.github %}
        <p><a href="https://github.com/{{ site.footer-links.github }}">GitHub</a></p>
        {% endif %}
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
